name: Unzip Bang
on: workflow_dispatch
jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: unzip eas_educstuion-main (2).zip && rm eas_educstuion-main (2).zip
      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "unzipped by actions" || echo "no changes"
          git push
