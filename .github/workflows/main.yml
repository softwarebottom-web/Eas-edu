name: Pindahin Folder
on: workflow_dispatch
jobs:
  move:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pindahin isi eas_educstuion-main ke root
        run: |
          mv eas_educstuion-main/* ./
          mv eas_educstuion-main/.* ./ 2>/dev/null || true
          rm -rf eas_educstuion-main
      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "pindah ke root by Kimi 🔥" || echo "no changes"
          git push
